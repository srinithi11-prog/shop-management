<!DOCTYPE html>
<html>
<head>
  <title>Customers</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;background:#f0f4f8;}
    .topbar{background:#007bff;color:white;padding:14px 24px;}
    .topbar h1{font-size:20px;}
    .nav{background:white;display:flex;gap:8px;padding:10px 20px;box-shadow:0 2px 6px rgba(0,0,0,0.08);flex-wrap:wrap;}
    .nav a{text-decoration:none;background:#007bff;color:white;padding:7px 14px;border-radius:6px;font-size:13px;position:relative;}
    .nav a:hover,.nav a.active{background:#0056b3;}
    .key-hint{position:absolute;top:-6px;right:-4px;background:#ff9800;color:white;font-size:9px;padding:1px 4px;border-radius:3px;font-weight:bold;}
    .container{padding:18px 24px;max-width:1000px;}
    .card{background:white;padding:18px;border-radius:10px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
    label{font-size:13px;color:#555;font-weight:bold;display:block;margin-bottom:3px;}
    input,select,textarea{padding:7px 9px;border:1px solid #ccc;border-radius:5px;font-size:13px;outline:none;width:100%;}
    input:focus,select:focus{border-color:#007bff;}
    button{background:#007bff;color:white;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold;}
    button:hover{background:#0056b3;}
    button.danger{background:#dc3545;}button.danger:hover{background:#a71d2a;}
    button.success{background:#28a745;}button.success:hover{background:#1a6e30;}
    button.warn{background:#fd7e14;}button.warn:hover{background:#c96a00;}
    button.purple{background:#6f42c1;}button.purple:hover{background:#5a32a3;}
    button.grey{background:#6c757d;}button.grey:hover{background:#545b62;}
    .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px;}
    .f{display:flex;flex-direction:column;gap:3px;}
    /* Tabs */
    .tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #dee2e6;}
    .tab-btn{background:none;color:#555;border:none;border-bottom:3px solid transparent;padding:10px 22px;cursor:pointer;font-size:14px;font-weight:bold;margin-bottom:-2px;}
    .tab-btn.active{color:#007bff;border-bottom-color:#007bff;background:none;}
    .tab-content{display:none;}.tab-content.show{display:block;}
    /* Customer card grid */
    .cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:14px;}
    .cust-card{background:#f8f9fa;border:1px solid #dee2e6;border-radius:8px;padding:14px;cursor:pointer;transition:all 0.2s;}
    .cust-card:hover,.cust-card.selected{background:#e8f0ff;border-color:#007bff;}
    .cust-card h4{font-size:15px;color:#333;margin-bottom:4px;}
    .cust-card p{font-size:12px;color:#888;margin:2px 0;}
    .cust-card .due{color:#dc3545;font-weight:bold;font-size:13px;}
    .pagination{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:12px;}
    .pagination button{padding:6px 14px;font-size:13px;}
    .pagination span{font-size:13px;color:#555;}
    /* Detail panel */
    .detail-panel{background:#f0f4f8;border-radius:8px;padding:16px;margin-top:14px;display:none;}
    .detail-panel.show{display:block;}
    table.stmt-tbl{width:100%;border-collapse:collapse;font-size:13px;}
    table.stmt-tbl th{background:#007bff;color:white;padding:8px;text-align:center;}
    table.stmt-tbl td{padding:7px;border:1px solid #eee;text-align:center;}
    table.credit-tbl{width:100%;border-collapse:collapse;}
    table.credit-tbl th{background:#dc3545;color:white;padding:8px;font-size:13px;}
    table.credit-tbl td{padding:7px;border:1px solid #eee;font-size:13px;text-align:center;}
    .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:flex-start;overflow-y:auto;padding:20px 10px;}
    .modal-overlay.show{display:flex;}
    .modal{background:white;padding:22px;border-radius:10px;width:680px;max-width:98%;margin:auto;}
    @media print{@page{size:A4;margin:10mm;}body *{visibility:hidden;}#stmtPrintArea,#stmtPrintArea *{visibility:visible;}#stmtPrintArea{position:fixed;top:0;left:0;width:100%;}.no-print{display:none!important;}}
    #stmtPrintArea{font-family:'Courier New',monospace;padding:20px;display:none;font-size:14px;}
  </style>
</head>
<body>
<div class="topbar"><h1>👤 Customers</h1></div>
<div class="nav">
  <a href="index.html">🏠 Home<span class="key-hint">0</span></a>
  <a href="billing.html">🧾 Billing<span class="key-hint">1</span></a>
  <a href="quotation.html">📋 Quotation<span class="key-hint">2</span></a>
  <a href="purchase-bill.html">📥 Purchase<span class="key-hint">3</span></a>
  <a href="products.html">📦 Products<span class="key-hint">4</span></a>
  <a href="customers.html" class="active">👤 Customers<span class="key-hint">5</span></a>
  <a href="suppliers.html">🏭 Suppliers<span class="key-hint">6</span></a>
  <a href="expenses.html">💸 Expenses<span class="key-hint">7</span></a>
  <a href="reports.html">📊 Reports<span class="key-hint">8</span></a>
  <a href="retrieve-bill.html">🔍 Find Bill<span class="key-hint">9</span></a>
</div>

<div class="container">
  <!-- Add Customer -->
  <div class="card">
    <h3 style="margin-bottom:12px;">➕ Add Customer</h3>
    <div class="row">
      <div class="f"><label>Name *</label><input id="cname" placeholder="Customer name"></div>
      <div class="f"><label>Phone</label><input id="cphone" placeholder="Phone"></div>
      <div class="f" style="flex:1;"><label>Address</label><input id="caddress" placeholder="Address"></div>
      <div class="f"><label>GSTIN</label><input id="cgstin" placeholder="GST number"></div>
    </div>
    <div class="row">
      <div class="f">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal;">
          <input type="checkbox" id="cIsRegular" style="width:auto;" checked>
          <span>Save as <b>Regular Customer</b></span>
        </label>
      </div>
      <div class="f"><label>&nbsp;</label><button onclick="addCustomer()">Add Customer</button></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('regular',this)">👥 Regular Customers</button>
      <button class="tab-btn" onclick="showTab('credit',this)">💳 Credit / Outstanding</button>
    </div>

    <!-- Regular Tab -->
    <div class="tab-content show" id="regularTab">
      <div class="row" style="margin-bottom:12px;">
        <div class="f" style="flex:1;"><input id="regSearch" placeholder="Search by name or phone..." oninput="searchRegular()" style="width:100%;"></div>
      </div>
      <div class="cust-grid" id="regGrid"></div>
      <div class="pagination" id="regPagination"></div>
      <!-- Detail Panel -->
      <div class="detail-panel" id="regDetail">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
          <h3 id="detailName" style="color:#007bff;"></h3>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="warn" onclick="showEditModal()">✏️ Edit</button>
            <button onclick="showStatement()">📊 Statement</button>
            <button class="success" onclick="showAddPayment()">💰 Add Payment</button>
            <button class="danger" onclick="deleteCustomer()">🗑 Delete</button>
          </div>
        </div>
        <div id="detailInfo" style="font-size:13px;color:#555;margin-bottom:12px;"></div>
        <div id="detailBills" style="overflow-x:auto;"></div>
      </div>
    </div>

    <!-- Credit Tab -->
    <div class="tab-content" id="creditTab">
      <h4 style="margin-bottom:12px;color:#dc3545;">💳 Outstanding Credit Customers</h4>
      <div style="overflow-x:auto;">
        <table class="credit-tbl">
          <thead><tr><th>Name</th><th>Phone</th><th>Outstanding ₹</th><th>Actions</th></tr></thead>
          <tbody id="creditBody"></tbody>
        </table>
      </div>
      <div style="margin-top:12px;font-size:14px;font-weight:bold;color:#dc3545;" id="totalOutstanding"></div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 style="margin-bottom:14px;color:#007bff;">✏️ Edit Customer</h3>
    <div class="row">
      <div class="f"><label>Name *</label><input id="eName"></div>
      <div class="f"><label>Phone</label><input id="ePhone"></div>
    </div>
    <div class="row">
      <div class="f" style="flex:1;"><label>Address</label><input id="eAddress"></div>
      <div class="f"><label>GSTIN</label><input id="eGstin"></div>
    </div>
    <div class="row">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal;font-size:13px;">
        <input type="checkbox" id="eIsRegular" style="width:auto;">
        <span>Regular Customer</span>
      </label>
    </div>
    <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
      <button class="success" onclick="saveEditCustomer()">💾 Save</button>
      <button class="danger" onclick="closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Statement Modal -->
<div class="modal-overlay" id="stmtModal">
  <div class="modal" style="width:780px;">
    <div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <h3 id="stmtTitle" style="color:#007bff;">Statement</h3>
      <div style="display:flex;gap:8px;">
        <div class="f"><label>From</label><input type="date" id="stmtFrom" style="width:140px;"></div>
        <div class="f"><label>To</label><input type="date" id="stmtTo" style="width:140px;"></div>
        <div class="f"><label>&nbsp;</label><button onclick="loadStatement()" style="padding:7px 14px;">Filter</button></div>
      </div>
    </div>
    <div class="no-print" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:flex-end;">
      <button class="warn" onclick="printStatement()">🖨️ Print</button>
      <button class="purple" onclick="sharePDFStatement()">📤 Share PDF</button>
      <button onclick="clearStmtFilter()" style="background:#888;padding:7px 14px;">Clear Filter</button>
    </div>
    <div id="stmtContent" style="overflow-x:auto;"></div>
    <div id="stmtPrintArea"></div>
    <div style="margin-top:14px;text-align:right;">
      <button class="danger" onclick="closeStmtModal()">Close</button>
    </div>
  </div>
</div>

<!-- Add Payment Modal -->
<div class="modal-overlay" id="payModal">
  <div class="modal" style="width:460px;">
    <h3 style="margin-bottom:14px;color:#28a745;">💰 Record Payment</h3>
    <div class="row">
      <div class="f"><label>Amount ₹ *</label><input type="number" id="payAmt" placeholder="0.00"></div>
      <div class="f"><label>Date</label><input type="date" id="payDate"></div>
    </div>
    <div class="f" style="margin-bottom:12px;"><label>Note</label><input id="payNote" placeholder="e.g. Cash received"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="success" onclick="savePayment()">💾 Save</button>
      <button class="danger" onclick="closePayModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API=`${window.location.protocol}//${window.location.hostname}:3000`;
const SHOP="SUN CERAMIC",PHONE_NO="9942607766";
if(!sessionStorage.getItem("loggedIn"))window.location.href="login.html";

let allRegular=[],regPage=1,regPages=1,selectedCustomer=null;

// ── TABS ───────────────────────────────────────────────
function showTab(tab,btn){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("show"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(tab+"Tab").classList.add("show");
  btn.classList.add("active");
  if(tab==="credit") loadCreditCustomers();
}

// ── ADD CUSTOMER ───────────────────────────────────────
function addCustomer(){
  const name=document.getElementById("cname").value.trim();
  if(!name){alert("Enter customer name");return;}
  fetch(API+"/customers",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,phone:document.getElementById("cphone").value.trim(),address:document.getElementById("caddress").value.trim(),gstin:document.getElementById("cgstin").value.trim()})})
  .then(r=>r.json()).then(d=>{
    if(d.error){alert("Error: "+d.error);return;}
    if(document.getElementById("cIsRegular").checked){
      fetch(API+"/mark-regular/"+d.customer_id,{method:"POST"}).catch(()=>{});
    }
    ["cname","cphone","caddress","cgstin"].forEach(id=>document.getElementById(id).value="");
    loadRegularPage(1);
  });
}

// ── REGULAR CUSTOMERS ─────────────────────────────────
function loadRegularPage(page){
  const q=document.getElementById("regSearch").value.trim();
  let url=`${API}/customers-page?page=${page}&limit=10`;
  if(q) url+=`&search=${encodeURIComponent(q)}`;
  // Filter only regular
  fetch(API+"/regular-customers").then(r=>r.json()).then(data=>{
    const q2=document.getElementById("regSearch").value.trim().toLowerCase();
    let filtered=data.filter(c=>!q2||c.name.toLowerCase().includes(q2)||(c.phone||"").includes(q2));
    regPages=Math.ceil(filtered.length/10)||1;
    regPage=page;
    const start=(page-1)*10;
    const pageData=filtered.slice(start,start+10);
    renderRegGrid(pageData);
    renderRegPagination(filtered.length);
  });
}

function searchRegular(){regPage=1;loadRegularPage(1);}

function renderRegGrid(data){
  const grid=document.getElementById("regGrid");
  grid.innerHTML="";
  if(!data.length){grid.innerHTML=`<p style="color:#888;grid-column:1/-1;">No regular customers found</p>`;return;}
  data.forEach(c=>{
    const due=parseFloat(c.balance)||0;
    const div=document.createElement("div");
    div.className="cust-card"+(selectedCustomer&&selectedCustomer.customer_id===c.customer_id?" selected":"");
    div.innerHTML=`<h4>${c.name}</h4>
      ${c.phone?`<p>📞 ${c.phone}</p>`:""}
      ${c.address?`<p>📍 ${c.address}</p>`:""}
      ${due>0?`<p class="due">💳 Due: ₹${due.toFixed(2)}</p>`:`<p style="color:#28a745;">✅ Clear</p>`}`;
    div.onclick=()=>selectCustomer(c);
    grid.appendChild(div);
  });
}

function renderRegPagination(total){
  const div=document.getElementById("regPagination");
  div.innerHTML="";
  if(regPages<=1)return;
  const btn=(txt,pg,disabled)=>{const b=document.createElement("button");b.innerText=txt;b.onclick=()=>loadRegularPage(pg);b.disabled=disabled;b.style.background=pg===regPage?"#0056b3":"#007bff";return b;};
  div.appendChild(btn("◀",regPage-1,regPage===1));
  const span=document.createElement("span");span.innerText=`Page ${regPage} of ${regPages} (${total} customers)`;div.appendChild(span);
  div.appendChild(btn("▶",regPage+1,regPage===regPages));
}

function selectCustomer(c){
  selectedCustomer=c;
  document.querySelectorAll(".cust-card").forEach(el=>el.classList.remove("selected"));
  event.currentTarget.classList.add("selected");
  document.getElementById("detailName").innerText=c.name;
  const due=parseFloat(c.balance)||0;
  document.getElementById("detailInfo").innerHTML=`
    ${c.phone?`<b>Phone:</b> ${c.phone} &nbsp;|&nbsp;`:""} 
    ${c.address?`<b>Address:</b> ${c.address} &nbsp;|&nbsp;`:""}
    <b>Balance:</b> <span style="color:${due>0?"#dc3545":"#28a745"};font-weight:bold;">₹${due.toFixed(2)}</span>
  `;
  document.getElementById("regDetail").classList.add("show");
  loadCustomerBills(c.customer_id);
}

function loadCustomerBills(cid){
  fetch(API+"/customer-history/"+cid).then(r=>r.json()).then(bills=>{
    const div=document.getElementById("detailBills");
    if(!bills.length){div.innerHTML="<p style='color:#888;'>No bills yet</p>";return;}
    div.innerHTML=`<h4 style="margin-bottom:8px;">Recent Bills</h4>
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <thead style="background:#f0f4f8;"><tr><th style="padding:7px;">Q No</th><th>Date</th><th>Mode</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>${bills.slice(0,10).map(b=>`<tr>
        <td>Q-${b.bill_id}</td>
        <td>${new Date(b.bill_date).toLocaleDateString("en-IN")}</td>
        <td>${b.payment_mode}</td>
        <td>₹${parseFloat(b.grand_total).toFixed(2)}</td>
        <td>${b.cancelled?'<span style="color:red;">Cancelled</span>':'<span style="color:green;">Active</span>'}</td>
        <td><a href="retrieve-bill.html" style="color:#007bff;font-size:12px;">View →</a></td>
      </tr>`).join("")}</tbody>
    </table>`;
  });
}

// ── EDIT CUSTOMER ──────────────────────────────────────
function showEditModal(){
  if(!selectedCustomer)return;
  document.getElementById("eName").value=selectedCustomer.name;
  document.getElementById("ePhone").value=selectedCustomer.phone||"";
  document.getElementById("eAddress").value=selectedCustomer.address||"";
  document.getElementById("eGstin").value=selectedCustomer.gstin||"";
  document.getElementById("eIsRegular").checked=selectedCustomer.is_regular===1;
  document.getElementById("editModal").classList.add("show");
}
function closeEditModal(){document.getElementById("editModal").classList.remove("show");}
function saveEditCustomer(){
  const c=selectedCustomer;
  fetch(API+"/customer/"+c.customer_id,{method:"PUT",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:document.getElementById("eName").value.trim(),phone:document.getElementById("ePhone").value.trim(),address:document.getElementById("eAddress").value.trim(),gstin:document.getElementById("eGstin").value.trim(),is_regular:document.getElementById("eIsRegular").checked?1:0})})
  .then(r=>r.json()).then(d=>{if(d.error){alert("Error: "+d.error);return;}alert("✅ Customer updated!");closeEditModal();loadRegularPage(regPage);});
}

function deleteCustomer(){
  if(!selectedCustomer)return;
  if(!confirm("Delete "+selectedCustomer.name+"?\nBills will still be retrievable."))return;
  fetch(API+"/customer/"+selectedCustomer.customer_id,{method:"DELETE"}).then(()=>{
    selectedCustomer=null;document.getElementById("regDetail").classList.remove("show");loadRegularPage(regPage);
  });
}

// ── STATEMENT ─────────────────────────────────────────
function showStatement(){
  if(!selectedCustomer)return;
  document.getElementById("stmtTitle").innerText="Statement: "+selectedCustomer.name;
  document.getElementById("stmtFrom").value="";
  document.getElementById("stmtTo").value="";
  document.getElementById("stmtModal").classList.add("show");
  loadStatement();
}
function clearStmtFilter(){
  document.getElementById("stmtFrom").value="";
  document.getElementById("stmtTo").value="";
  loadStatement();
}
function closeStmtModal(){document.getElementById("stmtModal").classList.remove("show");}

function loadStatement(){
  if(!selectedCustomer)return;
  const from=document.getElementById("stmtFrom").value;
  const to=document.getElementById("stmtTo").value;
  let url=`${API}/customer-statement/${selectedCustomer.customer_id}`;
  const params=[];
  if(from)params.push("from_date="+from);
  if(to)params.push("to_date="+to);
  if(params.length)url+="?"+params.join("&");

  const dateRange=(from||to)?`${from||"start"} To ${to||"today"}`:"All Time";

  fetch(url).then(r=>r.json()).then(d=>{
    const rows=d.transactions||[];
    const totalSales=parseFloat(d.total_sales||0);
    const totalCash=parseFloat(d.total_cash||0);
    const totalUPI=parseFloat(d.total_upi||0);
    const totalCredit=parseFloat(d.total_credit||0);
    const totalPaid=parseFloat(d.total_paid||0);
    const closing=parseFloat(d.closing_balance)||0;
    const totalDebit=totalCredit;

    const tbody=rows.map(t=>{
      const isSales=t.txn_type==="Sales";
      const isCredit=isSales&&t.payment_mode==="CREDIT";
      const debit=isSales?parseFloat(t.debit_amt)||0:0;
      const credit=t.txn_type==="Payment"?parseFloat(t.credit_amt)||0:0;
      const bal=parseFloat(t.running_balance)||0;
      // For cash/UPI bills — show debit but balance stays 0 (not on credit)
      const balDisplay=isCredit||t.txn_type==="Payment"
        ?`₹${Math.abs(bal).toFixed(2)} ${bal>0?"Dr":"Cr"}`
        :"—";
      return `<tr style="${isSales&&!isCredit?"background:#f9fff9;":""}">
        <td style="padding:8px 10px;font-size:14px;">${new Date(t.txn_date).toLocaleDateString("en-IN")}</td>
        <td style="text-align:left;font-size:14px;">${isSales?"Sales a/c":"Cash A/c"}</td>
        <td style="font-size:14px;">${isSales?"Q Sales ("+t.payment_mode+")":"Receipt"}</td>
        <td style="font-size:14px;">${isSales?"Q-"+t.ref_no:"Rcpt-"+t.ref_no}</td>
        <td style="color:#dc3545;font-weight:bold;font-size:15px;">${debit>0?"₹"+debit.toFixed(2):""}</td>
        <td style="color:#28a745;font-weight:bold;font-size:15px;">${credit>0?"₹"+credit.toFixed(2):""}</td>
        <td style="font-weight:bold;font-size:15px;color:${bal>0?"#dc3545":"#28a745"};">${balDisplay}</td>
      </tr>`;
    }).join("");

    document.getElementById("stmtContent").innerHTML=`
      <div style="font-family:'Courier New',monospace;">
        <div style="text-align:center;margin-bottom:10px;padding:10px;background:#f0f4f8;border-radius:8px;">
          <div style="font-size:22px;font-weight:bold;letter-spacing:2px;">${SHOP}</div>
          <div style="font-size:14px;">CELL: ${PHONE_NO}</div>
        </div>
        <div style="text-align:center;margin-bottom:6px;">
          <div style="font-size:17px;font-weight:bold;">Ledger of: ${selectedCustomer.name}</div>
          ${selectedCustomer.phone?`<div style="font-size:14px;color:#555;">${selectedCustomer.phone}</div>`:""}
          <div style="font-size:13px;color:#888;">${dateRange}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;">
          <div style="background:#e8f4fd;padding:10px 14px;border-radius:8px;flex:1;text-align:center;min-width:120px;">
            <div style="font-size:12px;color:#888;">Total Sales</div>
            <div style="font-size:17px;font-weight:bold;color:#007bff;">₹${totalSales.toFixed(2)}</div>
          </div>
          <div style="background:#e8f7ef;padding:10px 14px;border-radius:8px;flex:1;text-align:center;min-width:120px;">
            <div style="font-size:12px;color:#888;">Cash Bills</div>
            <div style="font-size:17px;font-weight:bold;color:#28a745;">₹${totalCash.toFixed(2)}</div>
          </div>
          <div style="background:#e8f7ef;padding:10px 14px;border-radius:8px;flex:1;text-align:center;min-width:120px;">
            <div style="font-size:12px;color:#888;">UPI Bills</div>
            <div style="font-size:17px;font-weight:bold;color:#17a2b8;">₹${totalUPI.toFixed(2)}</div>
          </div>
          <div style="background:#fff3cd;padding:10px 14px;border-radius:8px;flex:1;text-align:center;min-width:120px;">
            <div style="font-size:12px;color:#888;">Credit Bills</div>
            <div style="font-size:17px;font-weight:bold;color:#dc3545;">₹${totalCredit.toFixed(2)}</div>
          </div>
          <div style="background:#f3eeff;padding:10px 14px;border-radius:8px;flex:1;text-align:center;min-width:120px;">
            <div style="font-size:12px;color:#888;">Payments Rcvd</div>
            <div style="font-size:17px;font-weight:bold;color:#6f42c1;">₹${totalPaid.toFixed(2)}</div>
          </div>
          <div style="background:${closing>0?"#fff0f0":"#e8f7ef"};padding:10px 14px;border-radius:8px;flex:1;text-align:center;min-width:120px;">
            <div style="font-size:12px;color:#888;">Balance Due</div>
            <div style="font-size:18px;font-weight:bold;color:${closing>0?"#dc3545":"#28a745"};">₹${closing.toFixed(2)}</div>
          </div>
        </div>
        <div style="border-top:2px solid #333;margin:8px 0;"></div>
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr style="background:#007bff;color:white;">
            <th style="padding:10px 8px;font-size:14px;border:1px solid #aaa;">Date</th>
            <th style="border:1px solid #aaa;font-size:14px;">Particulars</th>
            <th style="border:1px solid #aaa;font-size:14px;">Vch Type</th>
            <th style="border:1px solid #aaa;font-size:14px;">Vch No</th>
            <th style="border:1px solid #aaa;font-size:14px;">Debit ₹</th>
            <th style="border:1px solid #aaa;font-size:14px;">Credit ₹</th>
            <th style="border:1px solid #aaa;font-size:14px;">Balance</th>
          </tr></thead>
          <tbody>${tbody||`<tr><td colspan="7" style="color:#888;padding:14px;text-align:center;font-size:14px;">No transactions in this period</td></tr>`}</tbody>
          <tfoot><tr style="background:#f0f4f8;font-weight:bold;">
            <td colspan="4" style="padding:10px 8px;border:1px solid #ddd;font-size:15px;">TOTAL</td>
            <td style="border:1px solid #ddd;color:#dc3545;font-size:15px;">₹${totalDebit.toFixed(2)}</td>
            <td style="border:1px solid #ddd;color:#28a745;font-size:15px;">₹${totalCredit.toFixed(2)}</td>
            <td style="border:1px solid #ddd;"></td>
          </tr></tfoot>
        </table>
        <div style="border-top:2px solid #333;margin-top:10px;padding-top:8px;text-align:right;font-size:17px;font-weight:bold;color:${closing>0?"#dc3545":"#28a745"};">
          Closing Balance : ₹${closing.toFixed(2)} ${closing>0?"Dr":"Cr"}
        </div>
      </div>`;
    buildStmtPrintArea(d, rows, dateRange, totalDebit, totalCredit, closing);
  });
}

function buildStmtPrintArea(d, rows, dateRange, totalDebit, totalCredit, closing){
  const totalSales=parseFloat(d.total_sales||0);
  const totalCash=parseFloat(d.total_cash||0);
  const totalUPI=parseFloat(d.total_upi||0);
  const totalPaid=parseFloat(d.total_paid||0);
  const tbody=rows.map(t=>{
    const isSales=t.txn_type==="Sales";
    const debit=isSales?parseFloat(t.debit_amt)||0:0;
    const credit=t.txn_type==="Payment"?parseFloat(t.credit_amt)||0:0;
    const bal=parseFloat(t.running_balance)||0;
    const balDisplay=(isSales&&t.payment_mode==="CREDIT")||t.txn_type==="Payment"
      ?`₹${Math.abs(bal).toFixed(2)} ${bal>0?"Dr":"Cr"}`:"—";
    return `<tr>
      <td style="padding:7px 8px;border:1px solid #333;font-size:13px;">${new Date(t.txn_date).toLocaleDateString("en-IN")}</td>
      <td style="border:1px solid #333;font-size:13px;">${isSales?"Sales a/c":"Cash A/c"}</td>
      <td style="border:1px solid #333;font-size:13px;">${isSales?"Q Sales ("+t.payment_mode+")":"Receipt"}</td>
      <td style="border:1px solid #333;font-size:13px;">${isSales?"Q-"+t.ref_no:"Rcpt-"+t.ref_no}</td>
      <td style="border:1px solid #333;text-align:right;font-size:13px;font-weight:bold;">${debit>0?"₹"+debit.toFixed(2):""}</td>
      <td style="border:1px solid #333;text-align:right;font-size:13px;font-weight:bold;">${credit>0?"₹"+credit.toFixed(2):""}</td>
      <td style="border:1px solid #333;text-align:right;font-size:13px;font-weight:bold;">${balDisplay}</td>
    </tr>`;
  }).join("");

  document.getElementById("stmtPrintArea").innerHTML=`
    <div style="text-align:center;margin-bottom:10px;">
      <div style="font-size:22px;font-weight:bold;letter-spacing:2px;">${SHOP}</div>
      <div style="font-size:14px;">CELL: ${PHONE_NO}</div>
    </div>
    <div style="text-align:center;margin-bottom:8px;">
      <div style="font-size:17px;font-weight:bold;">Ledger of: ${selectedCustomer.name}</div>
      ${selectedCustomer.phone?`<div style="font-size:13px;">${selectedCustomer.phone}</div>`:""}
      <div style="font-size:13px;">${dateRange}</div>
    </div>
    <div style="border:1px solid #333;padding:6px;margin:6px 0;font-size:13px;">
      Total Sales: ₹${totalSales.toFixed(2)} &nbsp;|&nbsp;
      Cash: ₹${totalCash.toFixed(2)} &nbsp;|&nbsp;
      UPI: ₹${totalUPI.toFixed(2)} &nbsp;|&nbsp;
      Credit: ₹${totalDebit.toFixed(2)} &nbsp;|&nbsp;
      Paid: ₹${totalPaid.toFixed(2)}
    </div>
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr style="background:#eee;">
        <th style="padding:8px;border:1px solid #333;font-size:14px;">Date</th>
        <th style="border:1px solid #333;font-size:14px;">Particulars</th>
        <th style="border:1px solid #333;font-size:14px;">Vch Type</th>
        <th style="border:1px solid #333;font-size:14px;">Vch No</th>
        <th style="border:1px solid #333;font-size:14px;text-align:right;">Debit</th>
        <th style="border:1px solid #333;font-size:14px;text-align:right;">Credit</th>
        <th style="border:1px solid #333;font-size:14px;text-align:right;">Balance</th>
      </tr></thead>
      <tbody>${tbody}</tbody>
      <tfoot><tr style="background:#eee;font-weight:bold;">
        <td colspan="4" style="padding:8px;border:1px solid #333;font-size:14px;">TOTAL</td>
        <td style="border:1px solid #333;text-align:right;font-size:14px;">₹${totalSales.toFixed(2)}</td>
        <td style="border:1px solid #333;text-align:right;font-size:14px;">₹${totalPaid.toFixed(2)}</td>
        <td style="border:1px solid #333;"></td>
      </tr></tfoot>
    </table>
    <div style="border-top:2px solid #333;margin-top:8px;padding-top:6px;">
      <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:bold;">
        <span>Total Sales: ₹${totalSales.toFixed(2)} | Paid: ₹${totalPaid.toFixed(2)}</span>
        <span>Balance Due : ₹${closing.toFixed(2)} ${closing>0?"Dr":"Cr"}</span>
      </div>
    </div>`;
}

function printStatement(){document.getElementById("stmtPrintArea").style.display="block";window.print();setTimeout(()=>{document.getElementById("stmtPrintArea").style.display="none";},600);}

async function sharePDFStatement(){
  const btn=event.target;const orig=btn.innerText;btn.innerText="⏳...";btn.disabled=true;
  document.getElementById("stmtPrintArea").style.display="block";
  try{
    const {jsPDF}=window.jspdf;
    const canvas=await html2canvas(document.getElementById("stmtPrintArea"),{scale:2,backgroundColor:"#ffffff"});
    document.getElementById("stmtPrintArea").style.display="none";
    const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const pw=pdf.internal.pageSize.getWidth()-20;
    pdf.addImage(canvas.toDataURL("image/png"),"PNG",10,10,pw,(canvas.height*pw)/canvas.width);
    const fname="Statement-"+selectedCustomer.name+".pdf";
    if(navigator.share){const blob=pdf.output("blob");const file=new File([blob],fname,{type:"application/pdf"});try{await navigator.share({files:[file],title:"Statement",text:selectedCustomer.name});btn.innerText=orig;btn.disabled=false;return;}catch(ex){}}
    pdf.save(fname);
  }catch(e){document.getElementById("stmtPrintArea").style.display="none";alert("PDF error: "+e.message);}
  btn.innerText=orig;btn.disabled=false;
}

// ── PAYMENT ────────────────────────────────────────────
function showAddPayment(){
  if(!selectedCustomer)return;
  document.getElementById("payAmt").value="";
  document.getElementById("payDate").value=new Date().toISOString().split("T")[0];
  document.getElementById("payNote").value="";
  document.getElementById("payModal").classList.add("show");
}
function closePayModal(){document.getElementById("payModal").classList.remove("show");}
function savePayment(){
  const amt=parseFloat(document.getElementById("payAmt").value);
  if(!amt||amt<=0){alert("Enter valid amount");return;}
  fetch(API+"/credit-payment",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({customer_id:selectedCustomer.customer_id,amount:amt,payment_date:document.getElementById("payDate").value,note:document.getElementById("payNote").value})})
  .then(r=>r.json()).then(d=>{
    if(d.error){alert("Error: "+d.error);return;}
    alert("✅ Payment recorded!");closePayModal();loadRegularPage(regPage);loadCreditCustomers();
  });
}

// ── CREDIT CUSTOMERS ──────────────────────────────────
function loadCreditCustomers(){
  fetch(API+"/credit-customers").then(r=>r.json()).then(data=>{
    const tbody=document.getElementById("creditBody");
    tbody.innerHTML="";
    if(!data.length){tbody.innerHTML=`<tr><td colspan="4" style="color:#888;">No outstanding credit customers</td></tr>`;document.getElementById("totalOutstanding").innerText="";return;}
    let total=0;
    data.forEach(c=>{
      const bal=parseFloat(c.balance)||0;total+=bal;
      tbody.innerHTML+=`<tr>
        <td style="text-align:left;font-weight:bold;">${c.name}</td>
        <td>${c.phone||"-"}</td>
        <td style="color:#dc3545;font-weight:bold;">₹${bal.toFixed(2)}</td>
        <td>
          <button onclick="selectAndStatement(${c.customer_id},'${c.name.replace(/'/g,"\\'")}',${bal})" style="font-size:12px;padding:4px 10px;">Statement</button>
          <button class="success" onclick="quickPayment(${c.customer_id},'${c.name.replace(/'/g,"\\'")}',${bal})" style="font-size:12px;padding:4px 10px;margin-left:4px;">💰 Pay</button>
        </td>
      </tr>`;
    });
    document.getElementById("totalOutstanding").innerText="Total Outstanding: ₹"+total.toFixed(2);
  });
}

function selectAndStatement(cid,name,bal){
  selectedCustomer={customer_id:cid,name,balance:bal};
  showStatement();
}

function quickPayment(cid,name,bal){
  selectedCustomer={customer_id:cid,name,balance:bal};
  showAddPayment();
}

window.addEventListener("DOMContentLoaded",()=>{loadRegularPage(1);});

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){window.location.href="index.html";return;}
  const tag=document.activeElement?document.activeElement.tagName:"";
  if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT")return;
  const p={"0":"index.html","1":"billing.html","2":"quotation.html","3":"purchase-bill.html","4":"products.html","5":"customers.html","6":"suppliers.html","7":"expenses.html","8":"reports.html","9":"retrieve-bill.html"};
  if(p[e.key]){e.preventDefault();window.location.href=p[e.key];}
});
</script>
