<!DOCTYPE html>
<html>
<head>
  <title>Login - Shop Manager</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:Arial,sans-serif;background:#f0f4f8;display:flex;justify-content:center;align-items:center;height:100vh;}
    .box{background:white;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.12);width:360px;text-align:center;}
    .box h1{color:#007bff;margin-bottom:6px;font-size:24px;}
    .box p{color:#888;margin-bottom:28px;font-size:14px;}
    input{width:100%;padding:11px 14px;margin-bottom:14px;border:1px solid #ddd;border-radius:7px;font-size:15px;outline:none;}
    input:focus{border-color:#007bff;}
    button{width:100%;padding:12px;background:#007bff;color:white;border:none;border-radius:7px;font-size:16px;cursor:pointer;font-weight:bold;}
    button:hover{background:#0056b3;}
    .err{color:red;margin-top:12px;font-size:14px;}
  </style>
</head>
<body>
<div class="box">
  <h1>🏪 Shop Manager</h1>
  <p>Sign in to continue</p>
  <input id="username" type="text" placeholder="Username" autofocus>
  <input id="password" type="password" placeholder="Password">
  <button onclick="doLogin()">Login</button>
  <div class="err" id="err"></div>
</div>
<script>
const API = `${window.location.protocol}//${window.location.hostname}:3000`;
if(sessionStorage.getItem("loggedIn")) window.location.href="index.html";

function doLogin(){
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  if(!u||!p){ document.getElementById("err").innerText="Enter username and password"; return; }
  fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})})
  .then(r=>r.json()).then(d=>{
    if(d.success){ sessionStorage.setItem("loggedIn","true"); sessionStorage.setItem("username",d.username); window.location.href="index.html"; }
    else document.getElementById("err").innerText="Invalid username or password";
  });
}
document.addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
</script>
</body>
</html>
